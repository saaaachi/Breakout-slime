<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Breakout Slime - Max Revenue</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1299640300068792" crossorigin="anonymous"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; position: fixed; touch-action: none; }
        body { 
            display: flex; flex-direction: column; 
            background: #eceff1; font-family: 'Segoe UI', sans-serif;
        }
        
        /* 上部広告：100px固定（ここだけに絞る） */
        #ad-top { 
            width: 100%; height: 100px; background: #333; 
            display: flex; align-items: center; justify-content: center; 
            flex-shrink: 0; z-index: 100; border-bottom: 2px solid #009688;
        }

        /* ゲームエリア：下まで全開放 */
        #game-area { 
            flex-grow: 1; position: relative; width: 100%; background: #cfd8dc; overflow: hidden; 
        }
        canvas { display: block; width: 100%; height: 100%; }
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; font-size: 24px; font-weight: bold; color: #455a64; pointer-events: none; z-index: 10; text-shadow: 1px 1px 0px white; }
        
        #menuScreen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.97); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 200; padding: 10px;
        }

        #ad-middle-box { 
            width: 300px; height: 250px; background: #f5f5f5; margin: 15px 0; 
            display: none; justify-content: center; align-items: center; 
            border-radius: 12px; overflow: hidden; border: 1px solid #ddd;
        }
        
        .btn-group { display: flex; flex-direction: column; align-items: center; gap: 12px; width: 100%; }
        .menu-btn { width: 260px; padding: 16px; font-size: 18px; border: none; border-radius: 50px; color: white; font-weight: bold; cursor: pointer; text-decoration: none; text-align: center; transition: 0.2s; }
        #goButton { background: #009688; box-shadow: 0 4px #00695c; }
        #goButton:disabled { background: #ccc; box-shadow: none; color: #888; opacity: 0.7; }
        .link-btn { background: #ff4081; box-shadow: 0 4px #c2185b; }
        .best-info { color: #009688; font-size: 18px; font-weight: bold; margin-bottom: 5px; }

        #inter-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 99999; align-items: center; justify-content: center; }
        .inter-content { width: 330px; height: 330px; background: #fff; position: relative; border-radius: 8px; }
        #close-ad-btn { position: absolute; top: -50px; right: 0px; width: 45px; height: 45px; background: #333; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold; border: 2px solid #fff; cursor: pointer; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="ad-top">
        <ins class="adsbygoogle" style="display:inline-block;width:320px;height:100px" data-ad-client="ca-pub-1299640300068792" data-ad-slot="3972022911"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <div id="game-area">
        <div id="ui">SCORE: 0</div>
        
        <div id="menuScreen">
            <div style="text-align:center;">
                <h1 id="menuTitle" style="color:#009688; margin:0; font-size: 30px; letter-spacing: 1px;">SLIME BREAK</h1>
                <p id="menuMsg" style="margin:5px 0; color: #546e7a;">最速の弾きでブロックを壊せ！</p>
                <div class="best-info">BEST SCORE: <span id="best-ui">0</span></div>
            </div>

            <div id="ad-middle-box">
                <ins class="adsbygoogle" style="display:inline-block;width:300px;height:250px" data-ad-client="ca-pub-1299640300068792" data-ad-slot="9050127185"></ins>
                <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
            </div>

            <div class="btn-group">
                <button id="goButton" class="menu-btn" onclick="startGame()">GAME START</button>
                <a href="https://saaaachi.github.io/" class="menu-btn link-btn">他の無料ゲーム</a>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="inter-screen">
        <div class="inter-content">
            <div id="close-ad-btn" onclick="closeInterAd()">5</div>
            <iframe id="ifr-inter" src="about:blank" style="width:100%; height:100%; border:none; border-radius:8px; background:#fff;"></iframe>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas"), ctx = canvas.getContext("2d"),
              ui = document.getElementById("ui"), menuScreen = document.getElementById("menuScreen"),
              menuTitle = document.getElementById("menuTitle"), menuMsg = document.getElementById("menuMsg"),
              bestUi = document.getElementById("best-ui"), goButton = document.getElementById("goButton"),
              adMid = document.getElementById("ad-middle-box");

        let score = 0, bestScore = localStorage.getItem("breakout_best") || 0, gameActive = false, playCount = 0;
        let ball, paddle, bricks, animationId;

        function resize() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }
        window.onload = () => { resize(); bestUi.innerText = bestScore; };
        window.onresize = resize;

        function initGame() {
            ball = { x: canvas.width/2, y: canvas.height-80, dx: 4, dy: -4, r: 9 };
            paddle = { w: 100, h: 16, x: (canvas.width-100)/2 };
            bricks = [];
            const cols = 6, rows = 5;
            const bW = (canvas.width / cols) - 6;
            for(let c=0; c<cols; c++) {
                for(let r=0; r<rows; r++) {
                    bricks.push({ x: c * (canvas.width/cols) + 3, y: r * 30 + 50, w: bW, h: 22, status: 1 });
                }
            }
        }

        function startGame() {
            menuScreen.style.display = "none"; adMid.style.display = "none";
            gameActive = true; score = 0; ui.innerText = "SCORE: 0";
            initGame();
            draw();
        }

        canvas.addEventListener("touchmove", (e) => {
            if(!gameActive) return;
            const rect = canvas.getBoundingClientRect();
            paddle.x = e.touches[0].clientX - rect.left - paddle.w/2;
            if(paddle.x < 0) paddle.x = 0;
            if(paddle.x + paddle.w > canvas.width) paddle.x = canvas.width - paddle.w;
        }, {passive: true});

        function draw() {
            if(!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ball.x += ball.dx; ball.y += ball.dy;

            if(ball.x + ball.dx > canvas.width - ball.r || ball.x + ball.dx < ball.r) ball.dx = -ball.dx;
            if(ball.y + ball.dy < ball.r) ball.dy = -ball.dy;
            
            // パドルバウンド（底から30pxの位置で判定）
            if(ball.y + ball.dy > canvas.height - 35) {
                if(ball.x > paddle.x && ball.x < paddle.x + paddle.w) {
                    ball.dy = -Math.abs(ball.dy);
                    ball.dx = 10 * ((ball.x - (paddle.x + paddle.w/2)) / paddle.w);
                }
            }

            if(ball.y + ball.dy > canvas.height) { gameOver(); return; }

            let activeBricks = 0;
            bricks.forEach(b => {
                if(b.status == 1) {
                    activeBricks++;
                    if(ball.x > b.x && ball.x < b.x + b.w && ball.y > b.y && ball.y < b.y + b.h) {
                        ball.dy = -ball.dy;
                        b.status = 0;
                        score++;
                        ui.innerText = "SCORE: " + score;
                    }
                    ctx.fillStyle = "#0288d1";
                    ctx.beginPath();
                    if(ctx.roundRect) ctx.roundRect(b.x, b.y, b.w, b.h, 4); else ctx.rect(b.x, b.y, b.w, b.h);
                    ctx.fill();
                }
            });

            if(activeBricks === 0) {
                bricks.forEach(b => b.status = 1);
                ball.dy *= 1.15; ball.dx *= 1.15;
            }

            ctx.fillStyle = "#009688";
            ctx.beginPath();
            // パドルを描画（画面端より少し上に配置）
            if(ctx.roundRect) ctx.roundRect(paddle.x, canvas.height-25, paddle.w, paddle.h, 8); else ctx.rect(paddle.x, canvas.height-25, paddle.w, paddle.h);
            ctx.fill();

            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
            ctx.fillStyle = "#f44336";
            ctx.fill();
            ctx.closePath();

            animationId = requestAnimationFrame(draw);
        }

        function gameOver() {
            gameActive = false; playCount++;
            cancelAnimationFrame(animationId);
            if(score > bestScore) {
                bestScore = score;
                localStorage.setItem("breakout_best", bestScore);
                bestUi.innerText = bestScore;
            }

            goButton.innerText = "お待ちください...";
            goButton.disabled = true;
            adMid.style.display = "flex";

            menuTitle.innerText = "GAME OVER";
            menuTitle.style.color = "#f44336";
            menuMsg.innerHTML = "最終スコア: " + score;
            menuScreen.style.display = "flex";

            setTimeout(() => {
                goButton.disabled = false;
                goButton.innerText = "RETRY";
            }, 1500);

            if (playCount % 3 === 0) {
                setTimeout(showInterAd, 500);
            }
        }

        function showInterAd() {
            const screen = document.getElementById("inter-screen"), closeBtn = document.getElementById("close-ad-btn"), ifr = document.getElementById('ifr-inter');
            ifr.src = './ad.large.html?v=' + Date.now();
            screen.style.display = "flex";
            let timerVal = 5;
            closeBtn.innerText = timerVal; closeBtn.style.pointerEvents = "none";
            const countdown = setInterval(() => {
                timerVal--;
                if (timerVal > 0) closeBtn.innerText = timerVal;
                else {
                    clearInterval(countdown);
                    closeBtn.innerText = "×";
                    closeBtn.style.pointerEvents = "auto";
                }
            }, 1000);
        }

        function closeInterAd() {
            document.getElementById("inter-screen").style.display = "none";
            document.getElementById('ifr-inter').src = 'about:blank';
        }
    </script>
</body>
</html>
